name: Make Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build ${{ matrix.arch }}-${{ matrix.libc }}
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            libc: glibc
            os: ubuntu-latest
          - arch: aarch64
            libc: glibc
            os: ubuntu-24.04-arm
          - arch: x86_64
            libc: musl
            os: ubuntu-latest
          - arch: aarch64
            libc: musl
            os: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ----- GLIBC BUILDS (Native Ubuntu) -----
      - name: Install dependencies (glibc)
        if: matrix.libc == 'glibc'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang build-essential cmake pkg-config libsecret-1-dev libssl-dev libglfw3-dev libgl1-mesa-dev rpm libcurl4-openssl-dev libx11-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev

      - name: Build Packages (glibc)
        if: matrix.libc == 'glibc'
        run: |
          CXX=clang++ CC=clang make package

      # ----- MUSL BUILDS (Docker Alpine) -----
      - name: Build Packages (musl)
        if: matrix.libc == 'musl'
        run: |
          # Use Docker to spin up an Alpine container natively on the host architecture
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace alpine:latest /bin/sh -c "\
            apk update && \
            apk add clang make cmake pkgconf libsecret-dev openssl-dev glfw-dev mesa-dev g++ curl-dev git libx11-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev && \
            CXX=clang++ CC=clang make tar"

      # ----- UPLOAD -----
      - name: Zip AUR PKGBUILDs
        if: matrix.libc == 'glibc' && matrix.arch == 'x86_64'
        run: |
          cd build/aur && zip -r ../../aur_pkgbuilds.zip .

      - name: Upload AUR Artifact
        if: matrix.libc == 'glibc' && matrix.arch == 'x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: aur_pkgbuilds
          path: aur_pkgbuilds.zip
          retention-days: 1

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rlshim-release-${{ matrix.arch }}-${{ matrix.libc }}
          path: |
            build/*.deb
            build/*.rpm
            build/*.tar.gz
          retention-days: 1

  flatpak:
    name: Build Flatpak ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            os: ubuntu-latest
          - arch: aarch64
            os: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6.7
        with:
          bundle: life.srp.rlshim-${{ matrix.arch }}.flatpak
          manifest-path: packaging/flatpak/life.srp.rlshim.yml
          cache-key: flatpak-builder-${{ github.sha }}
          arch: ${{ matrix.arch }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rlshim-flatpak-release-${{ matrix.arch }}
          path: life.srp.rlshim-${{ matrix.arch }}.flatpak
          retention-days: 1
  publish:
    name: Publish Release
    needs: [release, flatpak]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: -vv --latest --strip all
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Prepare release notes
        id: release-notes
        run: |
          # Remove the version heading (redundant with GitHub release title)
          BODY=$(sed '/^## \[/d' CHANGES.md)
          echo "content<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: ${{ steps.release-notes.outputs.content }}
          fail_on_unmatched_files: false
          files: |
            artifacts/*.deb
            artifacts/*.rpm
            artifacts/*.tar.gz
            artifacts/*.flatpak
            artifacts/aur_pkgbuilds.zip
