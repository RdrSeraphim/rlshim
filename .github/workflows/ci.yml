name: CI

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*" # Don't run on release tags, since make-release handles those
  pull_request:

jobs:
  build:
    name: Build ${{ matrix.arch }}-${{ matrix.libc }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            libc: glibc
            os: ubuntu-latest
          - arch: aarch64
            libc: glibc
            os: ubuntu-24.04-arm
          - arch: x86_64
            libc: musl
            os: ubuntu-latest
          - arch: aarch64
            libc: musl
            os: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (glibc)
        if: matrix.libc == 'glibc'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang build-essential cmake pkg-config libsecret-1-dev libssl-dev libglfw3-dev libgl1-mesa-dev rpm libcurl4-openssl-dev libx11-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev

      - name: Build Debug Packages (glibc)
        if: matrix.libc == 'glibc'
        run: |
          CXX=clang++ CC=clang make debug-package

      - name: Build Debug Packages (musl)
        if: matrix.libc == 'musl'
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace alpine:latest /bin/sh -c "\
            apk update && \
            apk add clang make cmake pkgconf libsecret-dev openssl-dev glfw-dev mesa-dev g++ curl-dev git libx11-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev && \
            CXX=clang++ CC=clang make debug-tar"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rlshim-debug-${{ matrix.arch }}-${{ matrix.libc }}
          path: |
            build/*.deb
            build/*.rpm
            build/*.tar.gz
          retention-days: 7

  flatpak:
    name: Build Flatpak ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            os: ubuntu-latest
          - arch: aarch64
            os: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6.7
        with:
          bundle: life.srp.rlshim-${{ matrix.arch }}.flatpak
          manifest-path: packaging/flatpak/life.srp.rlshim.yml
          cache-key: flatpak-builder-${{ github.sha }}
          arch: ${{ matrix.arch }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rlshim-flatpak-${{ matrix.arch }}
          path: life.srp.rlshim-${{ matrix.arch }}.flatpak
          retention-days: 7
